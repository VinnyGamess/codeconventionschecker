name: 'CQE C# Linter'
description: 'Runs the Code Quality Engine linter on C# source files'

inputs:
  path:
    description: 'Path to scan (relative to repo root)'
    required: false
    default: '.'
  verbose:
    description: 'Show per-file scan info'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run CQE linter
      shell: bash
      run: |
        FLAGS=""
        if [ "${{ inputs.verbose }}" = "true" ]; then
          FLAGS="--verbose"
        fi
        node "${{ github.action_path }}/cli.js" "${{ inputs.path }}" $FLAGS
