name: 'CQE C# Linter'
description: 'Runs the Code Quality Engine linter on C# source files'

inputs:
  path:
    description: 'Path to scan (relative to repo root)'
    required: false
    default: '.'
  verbose:
    description: 'Show per-file scan info'
    required: false
    default: 'false'
  ollama-model:
    description: 'Ollama model to use for naming checks (e.g. llama3.2). Leave empty to skip CQE011.'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build
      shell: bash
      run: dotnet build "${{ github.action_path }}" --configuration Release

    - name: Cache Ollama model
      if: inputs.ollama-model != ''
      uses: actions/cache@v4
      with:
        path: ~/.ollama/models
        key: ollama-${{ inputs.ollama-model }}

    - name: Install Ollama and pull model
      if: inputs.ollama-model != ''
      shell: bash
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        ollama serve &
        sleep 3
        ollama pull ${{ inputs.ollama-model }}

    - name: Run CQE linter
      shell: bash
      env:
        OLLAMA_MODEL: ${{ inputs.ollama-model }}
      run: |
        FLAGS="--no-llm"
        if [ "${{ inputs.ollama-model }}" != "" ]; then
          FLAGS=""
        fi
        if [ "${{ inputs.verbose }}" = "true" ]; then
          FLAGS="$FLAGS --verbose"
        fi
        dotnet run --project "${{ github.action_path }}" --configuration Release -- "${{ inputs.path }}" $FLAGS
