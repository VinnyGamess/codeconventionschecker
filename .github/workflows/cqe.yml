name: Code Quality Check

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  cqe:
    name: CQE Linter
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run linter
        run: node cli.js . --verbose

      - name: Run tests
        run: node test/testRunner.js
